<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Infinite Craft - Todo en Uno (Definitiva)</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 50px; background: #111; color: #fff; }
    button, input { padding: 15px; font-size: 18px; margin: 10px; }
    #status { margin: 20px; font-size: 20px; color: #0f0; }
  </style>
</head>
<body>
  <h1>🚀 Infinite Craft - Todo en Uno</h1>
  <p>Sube tu JSON → genera TSV → abre Cosmograph automáticamente</p>
  
  <input type="file" id="fileInput" accept=".json">
  <button onclick="procesarTodo()">📤 Subir JSON y todo automático</button>
  
  <div id="status"></div>

  <script>
    async function procesarTodo() {
      const file = document.getElementById('fileInput').files[0];
      if (!file) return alert("Selecciona tu JSON");
      
      document.getElementById('status').innerHTML = "⏳ Procesando... Cosmograph se abrirá solo";
      
      const text = await file.text();
      const items = JSON.parse(text);
      
      let nodes = new Set();
      let links = [];
      const seen = new Set();
      
      ["Water", "Fire", "Wind", "Earth"].forEach(e => nodes.add(e));
      
      items.forEach(item => {
        if (!item || !item.text) return;
        const result = item.text;
        nodes.add(result);
        
        if (item.recipes) {
          item.recipes.forEach(pair => {
            if (!pair || pair.length < 2) return;
            
            let A = items[pair[0]] ? items[pair[0]].text : "Unknown";
            let B = items[pair[1]] ? items[pair[1]].text : "Unknown";
            
            if (A > B) [A, B] = [B, A];
            const combo = `${A} + ${B}`;
            nodes.add(combo);
            
            const key = combo + "→" + result;
            if (!seen.has(key)) {
              seen.add(key);
              // 3 enlaces saliendo de la combinación
              links.push([combo, A]);
              links.push([combo, B]);
              links.push([combo, result]);
            }
          });
        }
      });
      
      let points = "id\tlabel\tdiscovered\n";
      Array.from(nodes).forEach(n => points += `${n}\t${n}\t1\n`);
      
      let linksCSV = "source\ttarget\n";
      links.forEach(l => linksCSV += `${l[0]}\t${l[1]}\n`);
      
      descargar("points.tsv", points);
      descargar("links.tsv", linksCSV);
      
      document.getElementById('status').innerHTML = 
        `✅ ¡Listo! Archivos generados<br>
         Cosmograph se abre ahora... arrastra los dos TSV que se descargaron`;
      
      // Abrir Cosmograph automáticamente
      setTimeout(() => window.open('https://cosmograph.app', '_blank'), 1200);
    }
    
    function descargar(nombre, contenido) {
      const blob = new Blob([contenido], { type: 'text/tab-separated-values' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = nombre; a.click();
    }
  </script>
</body>
</html>
